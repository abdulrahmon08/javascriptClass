<!Doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Testing of javascript</title>
    <bootstrap>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/css/bootstrap.min.css" rel="stylesheet"
            integrity="sha384-KK94CHFLLe+nY2dmCWGMq91rCGa5gtU4mk92HdvYe+M/SXH301p5ILy+dN9+nJOZ" crossorigin="anonymous">
    </bootstrap>
</head>

<body>
    <div class="container">
        <h1>Testing of javascript</h1>
        <div class="container">
            <h3>Condition</h3>
            <p id="condition"></p>
            <button class="btn btn-primary" onclick="check()">Click me!</button>
        </div>
        <div class="container">
            <h3>Checking of Day</h3>
            <p id="switch"></p>
            <button class="btn btn-primary" onclick="checkDay()">Check the Day</button>
        </div>
    </div>
    <script>
        function check() {
            let age = 18;
            let check = (age < 18) ? "You are a minor," : "You are an adult.";
            document.getElementById("condition").innerHTML = check;
        }
        function checkDay() {
            let day;
            switch (new Date().getDay()) {
                case 0:
                    day = "Sunday";
                    break;
                case 1:
                    day = "Monday";
                    break;
                case 2:
                    day = "Tuesday";
                    break;
                case 3:
                    day = "Wednesday";
                    break;
                case 4:
                    day = "Thursday";
                    break;
                case 5:
                    day = "Friday";
                    break;
                case 6:
                    day = "Saturday";
            }
            document.getElementById("switch").innerHTML = "Today is " + day + ".";
        }
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-ENjdO4Dr2bkBIFxQpeoTz1HIcje39Wm4jDKdf19U8gI4ddQ3GYNS7NTKfAdVQSZe"
        crossorigin="anonymous"></script>
</body>
