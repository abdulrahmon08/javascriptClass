<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Testing of javascript</title>
    <bootstrap>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/css/bootstrap.min.css" rel="stylesheet"
            integrity="sha384-KK94CHFLLe+nY2dmCWGMq91rCGa5gtU4mk92HdvYe+M/SXH301p5ILy+dN9+nJOZ" crossorigin="anonymous">
</head>

<body>
    <div class="container" id="all">
        <h1>Testing of javascript</h1>
        <div class="container">
            <h3>Changing of words</h3>
            <p id="sample">This is a simple test page for javascript.</p>
            <button onclick="document.getElementById('sample').innerHTML = '<b>Go!</b>'">Change Text</button>
        </div>
        <div class="container">
            <h3>Function bulb</h3>
            <button onclick="document.getElementById('bulb').src = '../img/bulbOn.png'">Turn On</button>

            <img src="../img/bulbOff.png" alt="img" id="bulb" width="100px">

            <button onclick="document.getElementById('bulb').src = '../img/bulbOff.png'">Turn Off</button>
        </div>
        <div class ="cointainer">
            <h3>Check what date and time says</h3>
            <button onclick="document.getElementById('time').innerHTML = Date()">Click me!</button>
            <p id="time"></p>
        </div>
    </div>
    <button class="btn btn-primary" onclick="document.getElementById('all').style.display = 'none'">Hide all</button>
    <button class="btn btn-primary" onclick="document.getElementById('all').style.display = 'block'">Show all</button>


    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-ENjdO4Dr2bkBIFxQpeoTz1HIcje39Wm4jDKdf19U8gI4ddQ3GYNS7NTKfAdVQSZe"
        crossorigin="anonymous"></script>
</body>

</html>
