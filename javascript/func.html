<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Testing of javascript</title>
    <bootstrap>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/css/bootstrap.min.css" rel="stylesheet"
            integrity="sha384-KK94CHFLLe+nY2dmCWGMq91rCGa5gtU4mk92HdvYe+M/SXH301p5ILy+dN9+nJOZ" crossorigin="anonymous">
</head>

<body>
    <div class="container">
        <p id="func">First function</p>
        <button class="btn btn-primary" onclick="myFunction()">Click me!</button>
        <p id="input">Hello World!</p>
        <button class="btn btn-primary" onclick="change()">Click me!</button>
    </div>
    <div class="container pt-4">
        <button class="btn btn-primary" onclick="window.print()">Click to print!</button>
    </div>
    <script>
        function myFunction() {
            document.getElementById("func").innerHTML = "Second function";
        }
        function change() {
            alert(5 + 6);
        }
        console.log("Hello World!");
    </script> 
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-ENjdO4Dr2bkBIFxQpeoTz1HIcje39Wm4jDKdf19U8gI4ddQ3GYNS7NTKfAdVQSZe"
        crossorigin="anonymous"></script>
</body>

</html>
